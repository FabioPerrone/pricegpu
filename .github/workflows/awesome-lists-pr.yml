name: Awesome Lists PR

on:
  schedule:
    - cron: '0 10 1 * *'
  workflow_dispatch:

jobs:
  awesome-pr:
    name: Submit pricegpu.com to awesome lists
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npx tsx scripts/awesome-lists-pr.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
