name: Dead Page Cleanup

on:
  schedule:
    - cron: '0 9 1 */3 *'
  workflow_dispatch:

jobs:
  cleanup:
    name: Audit and noindex dead pages
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - id: cleanup
        run: npx tsx scripts/audit-indexation.ts --mode=cleanup
        env:
          GOOGLE_SEARCH_CONSOLE_SA_JSON: ${{ secrets.GOOGLE_SEARCH_CONSOLE_SA_JSON }}
        continue-on-error: true
      - run: |
          git config user.email "bot@pricegpu.com"
          git config user.name "PriceGPU Bot"
          git add src/content/ public/
          if git diff --cached --quiet; then
            echo "No noindex changes to commit."
          else
            git commit -m "chore: add noindex to dead pages $(date -u '+%Y-%m-%d')"
            git push
          fi
