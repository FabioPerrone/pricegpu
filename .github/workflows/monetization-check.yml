name: Monetization Threshold Check

on:
  schedule:
    - cron: '0 9 1 * *'
  workflow_dispatch:

jobs:
  check:
    name: Check traffic thresholds for monetization
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            import { readFileSync, existsSync } from 'fs';
            const REVENUE_FILE = 'data/revenue.json';
            const PAGEVIEW_THRESHOLD = 10_000;
            if (!existsSync(REVENUE_FILE)) {
              console.log('revenue.json not found');
              return;
            }
            let data;
            try {
              data = JSON.parse(readFileSync(REVENUE_FILE, 'utf8'));
            } catch (err) {
              console.error('Failed to parse revenue.json:', err.message);
              return;
            }
            const pageviews = data.pageviews ?? 0;
            console.log(`Pageviews: ${pageviews} (threshold: ${PAGEVIEW_THRESHOLD})`);
            if (pageviews <= PAGEVIEW_THRESHOLD) {
              console.log('Threshold not reached.');
              return;
            }
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'monetization,automated',
            });
            const duplicate = existing.data.find(i => i.title === 'Enable Ezoic: traffic threshold reached');
            if (duplicate) {
              console.log(`Issue already exists: #${duplicate.number}`);
              return;
            }
            const today = new Date().toISOString().split('T')[0];
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Enable Ezoic: traffic threshold reached',
              body: `## Traffic Threshold Reached\n\nAs of ${today}, pricegpu.com has ${pageviews.toLocaleString()} pageviews.`,
              labels: ['monetization', 'automated'],
            });
